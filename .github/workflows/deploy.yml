name: Deploy static site

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download static zip from WordPress
        run: |
          curl -L "http://757688.xyz/wp-content/uploads/simply-static/temp-files/simply-static-1-1772546357.zip" -o site.zip
          mkdir site
          unzip -q site.zip -d site

      - name: Rewrite links for /blog-static-backup/ base path
        run: |
          find site -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -print0 | \
          xargs -0 perl -i -pe 's{(href|src|action)=("|\x27)/}{$1=$2/blog-static-backup/}g'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
