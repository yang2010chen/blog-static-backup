name: Mirror blog to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Mirror website
        run: |
          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --domains 757688.xyz \
            --reject-regex 'wp-admin|wp-login.php' \
            https://757688.xyz/

      - name: Prepare publish dir for project pages
        run: |
          mkdir -p site
          cp -R 757688.xyz/* site/

      - name: Rewrite old-domain links to new GitHub Pages URL
        run: |
          find site -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -print0 | \
          xargs -0 perl -i -pe 's#https?://757688\.xyz#https://yang2010chen.github.io/blog-static-backup#g; s#href="/#href="/blog-static-backup/#g; s#src="/#src="/blog-static-backup/#g; s#action="/#action="/blog-static-backup/#g; s#href='\''/#href='\''/blog-static-backup/#g; s#src='\''/#src='\''/blog-static-backup/#g; s#action='\''/#action='\''/blog-static-backup/#g'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
