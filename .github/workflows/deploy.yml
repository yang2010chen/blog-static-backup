name: Deploy static site

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download static zip from WordPress
        run: |
          curl -L "http://757688.xyz/wp-content/uploads/simply-static/temp-files/simply-static-1-1772546357.zip" -o site.zip
          mkdir site
          unzip -q site.zip -d site

      - name: Rewrite links for GitHub Pages project path
        run: |
          python3 - <<'PY'
          from pathlib import Path
          base = '/blog-static-backup/'
          for p in Path('site').rglob('*'):
              if p.suffix.lower() not in {'.html', '.css', '.js'}:
                  continue
              s = p.read_text(encoding='utf-8', errors='ignore')
              s = s.replace('href="/', f'href="{base}')
              s = s.replace('src="/', f'src="{base}')
              s = s.replace('action="/', f'action="{base}')
              s = s.replace("href='/", f"href='{base}")
              s = s.replace("src='/", f"src='{base}")
              s = s.replace("action='/", f"action='{base}")
              p.write_text(s, encoding='utf-8')
          PY

      - name: Verify rewritten output
        run: |
          if grep -R --line-number 'href="/' site/index.html; then
            echo 'rewrite failed'; exit 1;
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
