name: Mirror blog to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Mirror website
        run: |
          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --domains 757688.xyz \
            --reject-regex 'wp-admin|wp-login.php' \
            https://757688.xyz/

      - name: Prepare publish dir for project pages
        run: |
          mkdir -p site
          cp -R 757688.xyz/* site/

      - name: Rewrite links to GitHub Pages URL/base
        run: |
          python3 - <<'PY'
          from pathlib import Path
          files = [p for p in Path('site').rglob('*') if p.is_file() and p.suffix.lower() in {'.html','.htm','.css','.js','.xml','.txt'}]
          for p in files:
              s = p.read_text(encoding='utf-8', errors='ignore')
              s = s.replace('https://757688.xyz', 'https://yang2010chen.github.io/blog-static-backup')
              s = s.replace('http://757688.xyz', 'https://yang2010chen.github.io/blog-static-backup')
              s = s.replace('href="/', 'href="/blog-static-backup/')
              s = s.replace('src="/', 'src="/blog-static-backup/')
              s = s.replace('action="/', 'action="/blog-static-backup/')
              s = s.replace("href='/", "href='/blog-static-backup/")
              s = s.replace("src='/", "src='/blog-static-backup/")
              s = s.replace("action='/", "action='/blog-static-backup/")
              p.write_text(s, encoding='utf-8')
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
